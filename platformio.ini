; ── Shared flags ─────────────────────────────────────────────
[common_flags]
build_flags =
  ; ⚡ Compiler optimizations
  -O3
  -ffast-math
  -funroll-loops
  -ffunction-sections
  -fdata-sections
  ; Logging: 0=DEBUG 1=INFO 2=WARN 3=ERROR 4=CRITICAL
  -DLOG_LEVEL=3
  ; Brownout threshold
  -DCONFIG_ESP32_BROWNOUT_DET_LVL=0
  ; BLE
  -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
  -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  ; TFT_eSPI — skip User_Setup.h, use build flags
  -DUSER_SETUP_LOADED=1
  ; Fonts
  -DLOAD_GLCD=1 -DLOAD_FONT2=1 -DLOAD_FONT4=1
  -DLOAD_FONT6=1 -DLOAD_FONT7=1 -DLOAD_FONT8=1
  -DLOAD_GFXFF=1 -DSMOOTH_FONT=1
  ; mbedTLS hardware acceleration
  -DCONFIG_MBEDTLS_HARDWARE_AES=y
  -DCONFIG_MBEDTLS_HARDWARE_SHA=y
  -DCONFIG_MBEDTLS_AES_USE_INTERRUPT=n
  -DCONFIG_MBEDTLS_ENTROPY_HARDWARE=y
  -DSECURE_LAYER_ENABLED=1

[common_libs]
lib_deps =
  me-no-dev/AsyncTCP @ 1.1.1
  me-no-dev/ESPAsyncWebServer @ 1.2.4
  bodmer/TFT_eSPI @ 2.5.43
  bblanchon/ArduinoJson @ 7.4.2
  adafruit/RTClib @ ^2.1.1
  https://github.com/yoprogramo/QRcodeDisplay.git
  https://github.com/yoprogramo/QRcode_eSPI.git

; ── T-Display ESP32 original ─────────────────────────────────
[env:lilygo-t-display]
platform = espressif32
board = lilygo-t-display
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
board_build.partitions = partitions_16mb.csv
board_build.arduino.stack_size = 16384
board_build.flash_size = 16MB
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
lib_deps = ${common_libs.lib_deps}
build_flags =
  ${common_flags.build_flags}
  -DTARGET_TDISPLAY_ESP32            ; fallback guard for board_config.h
  ; TFT — SPI interface
  -DST7789_DRIVER=1
  -DTFT_WIDTH=135
  -DTFT_HEIGHT=240
  -DTFT_MOSI=19
  -DTFT_SCLK=18
  -DTFT_CS=5
  -DTFT_DC=16
  -DTFT_RST=23
  -DTFT_BL=4
  -DTFT_BGR=1
  -DTFT_INVERSION_ON=1
  -DSPI_FREQUENCY=27000000

; ── T-Display S3 ─────────────────────────────────────────────
[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
board_build.variants_dir = variants
; Board manifest auto-provides:
;   ARDUINO_LILYGO_T_DISPLAY_S3, ARDUINO_USB_MODE=1,
;   ARDUINO_USB_CDC_ON_BOOT=1, qio_opi, 16MB flash, 80MHz flash
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb.csv
board_build.arduino.stack_size = 16384
board_build.f_cpu = 240000000L
lib_deps = ${common_libs.lib_deps}
build_flags =
  ${common_flags.build_flags}
  -DBOARD_HAS_PSRAM                  ; not in manifest, add explicitly
  -DARDUINO_USB_CDC_ON_BOOT=1        ; explicit CDC on boot for serial debugging
  -DARDUINO_LOOP_STACK_SIZE=32768
  ; TFT — 8-bit parallel interface
  -DST7789_DRIVER=1
  -DTFT_WIDTH=170
  -DTFT_HEIGHT=320
  -DTFT_PARALLEL_8_BIT=1
  -DTFT_CS=6
  -DTFT_DC=7
  -DTFT_RST=5
  -DTFT_WR=8
  -DTFT_RD=9
  -DTFT_D0=39 -DTFT_D1=40 -DTFT_D2=41 -DTFT_D3=42
  -DTFT_D4=45 -DTFT_D5=46 -DTFT_D6=47 -DTFT_D7=48
  -DTFT_BL=38
  -DTFT_BGR=1
  -DTFT_INVERSION_ON=1
  -DBOARD_HAS_USB_HID=1
