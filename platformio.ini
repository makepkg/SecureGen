[env:lilygo-t-display]
platform = espressif32
board = lilygo-t-display
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.arduino.stack_size = 16384

; ⚡ Flash & CPU Performance Optimization
board_build.flash_mode = qout        ; QOUT mode (Safe Quad I/O) - accelerates flash reading
board_build.f_flash = 80000000L      ; 80 MHz flash frequency (+100% vs 40MHz)
board_build.f_cpu = 240000000L       ; 240 MHz CPU frequency
; ⚡ Integer Math Optimization: Replacing float with fixed-point/integer:
;    - AnimationManager: pow() -> multiplication (14.5x faster, 320->22 cycles)
;    - BatteryManager: float voltage -> integer mV (5x faster)
;    Visually identical, error margin < 1 pixel

lib_deps =
    me-no-dev/AsyncTCP @ 1.1.1
    me-no-dev/ESPAsyncWebServer @ 1.2.4
    bodmer/TFT_eSPI @ 2.5.43
    bblanchon/ArduinoJson @ 7.4.2
    adafruit/RTClib @ ^2.1.1
    https://github.com/yoprogramo/QRcodeDisplay.git
    https://github.com/yoprogramo/QRcode_eSPI.git
    # mbedTLS components are already included in the ESP32 core
    
build_flags = 
    ; ⚡⚡⚡ MAXIMUM PERFORMANCE ⚡⚡⚡
    -O3                                    ; Maximum compiler optimization
    -ffast-math                            ; Fast mathematical operations
    -funroll-loops                         ; Unroll loops
    -ffunction-sections                    ; Separate function sections
    -fdata-sections                        ; Separate data sections
    
    ; 📝 LOGGING CONFIGURATION
    ; 0=DEBUG (all logs), 1=INFO, 2=WARNING, 3=ERROR (production), 4=CRITICAL
    -DLOG_LEVEL=3                          ; PRODUCTION mode - Only ERROR and CRITICAL logs
    
    ; 🔋 POWER STABILITY - Brownout Protection
    ; Lowering the brownout threshold for battery operation
    ; 0=2.43V (default), 1=2.33V, 2=2.26V, 3=2.17V
    -DCONFIG_ESP32_BROWNOUT_DET_LVL=0
    
    ; BLE Configuration
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DTFT_BGR=1 ; Set color order to BGR
    -DTFT_INVERSION_ON=1 ; Try with color inversion
    -DSPI_FREQUENCY=27000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; === SECURE LAYER OPTIMIZATION ===
    -DCONFIG_MBEDTLS_HARDWARE_AES=y
    -DCONFIG_MBEDTLS_HARDWARE_SHA=y
    -DCONFIG_MBEDTLS_AES_USE_INTERRUPT=n
    -DCONFIG_MBEDTLS_ENTROPY_HARDWARE=y
    -DSECURE_LAYER_ENABLED=1
